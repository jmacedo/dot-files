#theme-macedo.conf

font_family "SauceCodePro Nerd Font Mono"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0
modify_font underline_thickness 125%
cursor_trail 10
cursor_trail_decay 0.2 0.5
cursor_trail_start_threshold 4
cursor_shape block
# cursor_shape => block, beam, underline
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 15.0
cursor_shape_unfocused hollow
# cursor_shape_unfocused => block, beam, underline, hollow and unchanged
shell_integration no-cursor
# cursor_beam_thickness 1.5
# cursor_underline_thickness 2.0
url_style curly
background_opacity 0.9
dynamic_background_opacity no
background_image background.jpg
background_image_layout cscaled
background_tint 0.97
background_tint_gaps 1.0
active_tab_font_style bold
inactive_tab_font_style italic

tab_title_template {fmt.unbold}{fmt.italic}{fmt.fg.red}{bell_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}[{index}]: {'({}) '.format(num_windows) if num_windows > 1 else ''}{title}
active_tab_title_template {fmt.bold}{fmt.unitalic}{fmt.fg.red}{bell_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}[{index}]: {'({}) '.format(num_windows) if num_windows > 1 else ''}{title}
# active_tab_title_template => title, index, layout_name, session_name, active_session_name, num_windows, num_window_groups, tab.active_exe, max_title_length, tab.last_focused_progress_percent, tab.progress_percent
# Formatting is done by Python's string formatting machinery, so you can use, for instance, `{layout_name[:2].upper()}`, `{fmt.bold}bold{fmt.nobold}normal{fmt.italic}italic{fmt.noitalic}`

# scrollbar_width 1.0
# scrollbar_hover_width 1.5
# scrollbar_handle_opacity 0.3
# scrollbar_radius 0.8
# scrollbar_gap 0.1
# scrollbar_min_handle_height 4
# scrollbar_hitbox_expansion 0.25
# scrollbar_track_opacity 0.05
# scrollbar_track_hover_opacity 0.075
# scrollbar_handle_color #9448C0
# scrollbar_track_color #CBA6F7

cursor #9448C0
cursor_trail_color #CBA6F7
scrollbar_handle_color #9448C0
scrollbar_track_color #CBA6F7
url_color #16B6C5
active_border_color #C0FFDD
inactive_border_color #D9D2D9
window_title_bar_active_foreground #605D60
window_title_bar_active_background #2ACC75
window_title_bar_inactive_foreground #605D60
window_title_bar_inactive_background #D9D2D9
active_tab_foreground   #090215
active_tab_background   #F9F3F9
inactive_tab_foreground #605D60
inactive_tab_background #D9D2D9
tab_bar_background #605D60
foreground #dddddd
background #000000
selection_foreground #605D60
selection_background #FFFEBD

