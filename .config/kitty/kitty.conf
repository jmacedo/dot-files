#kitty.conf

clear_all_shortcuts yes
kitty_mod ctrl+shift
shell /usr/bin/zsh --login
editor nvim
close_on_child_death no
allow_remote_control yes
env read_from_shell
update_check_interval 168
auto_reload_config 0.1
allow_hyperlinks yes
shell_integration enabled
allow_cloning ask
notify_on_cmd_finish unfocused
wayland_titlebar_color system
map_timeout 0.0

### ALIASES
# action_alias => action_alias launch_tab launch --type=tab --cwd=current

### WINDOW CONFIGS
sync_to_monitor yes
enable_audio_bell yes
remember_window_size no
initial_window_width 1000
initial_window_height 600
window_resize_step_cells 5
window_resize_step_lines 5
window_border_width 1px
draw_minimal_borders yes
draw_window_borders_for_single_window no
window_margin_width 0 0 0 0
window_padding_width 0 0 0 0
inactive_text_alpha 0.3
hide_window_decorations no
confirm_os_window_close 0
window_title_bar bottom
window_title_bar_min_windows 2
window_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.window}{progress_percent}{fmt.bold}{title}"

### TAB BAR
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
# tab_bar_style => fade, slant, separator, powerline, hidden
tab_bar_align left
tab_bar_show_new_tab_button yes
tab_bar_min_tabs 1
tab_switch_strategy left
tab_powerline_style slanted
# tab_powerline_style => angled, slanted, round
tab_title_max_length 40

### SCROLLBACK / SCROLLBAR
scrollback_lines 4000
scrollbar always
scrollbar_interactive yes
scrollbar_jump_on_click yes
wheel_scroll_multiplier 1.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0
progress_bar bottom
# progress_bar (OSC 9;4) => left, right, top, bottom, hidden

### MOUSE CONFIGS
open_url_with default
url_prefixes file ftp ftps git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
underline_hyperlinks hover
copy_on_select clipboard
clear_selection_on_clipboard_loss yes
strip_trailing_spaces never
click_interval -1.0
focus_follows_mouse no
# mouse_map left click ungrabbed
# Uncomment above "mouse_map" if hyperlinks are open with a single click
mouse_hide_wait 1.5 0.2 1 0
# mouse_hide_wait => mouse_hide_wait (<hide-wait>) || (<hide-wait> <unhide-wait> <unhide-threshold> <scroll-unhide>)

### SHORTCUT MAPPING
# FONT RESIZING
map kitty_mod+plus      change_font_size all +2.0
map kitty_mod+minus     change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0
# WINDOW RESIZING
map kitty_mod+r start_resizing_window
map kitty_mod+0 first_window
map kitty_mod+1 second_window
map kitty_mod+2 third_window
map kitty_mod+3 fourth_window
map kitty_mod+4 fifth_window
map kitty_mod+5 sixth_window
map kitty_mod+6 seventh_window
map kitty_mod+7 eighth_window
map kitty_mod+8 ninth_window
map kitty_mod+9 tenth_window
# WINDOW MANAGEMENT
map kitty_mod+enter     new_window
map kitty_mod+n         new_os_window
map kitty_mod+w         close_window
map kitty_mod+right     next_window
map kitty_mod+left      previous_window
map kitty_mod+alt+right move_window_forward
map kitty_mod+alt+left  move_window_backward
map kitty_mod+alt+space move_window_to_top
# TAB MANAGEMENT
map ctrl+page_down     next_tab
map ctrl+page_up       previous_tab
map kitty_mod+t        new_tab
map kitty_mod+q        close_tab
map kitty_mod+F2       set_tab_title
map ctrl+alt+page_down move_tab_forward
map ctrl+alt+page_up   move_tab_backward
# SCROLLING
map kitty_mod+up        scroll_line_up smooth
map kitty_mod+down      scroll_line_down smooth
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+z         scroll_to_prompt -1
map kitty_mod+x         scroll_to_prompt 1
# MISCELLANEOUS 
map kitty_mod+f1 show_kitty_doc overview
map kitty_mod+f11 toggle_fullscreen
map kitty_mod+delete clear_terminal reset active
map kitty_mod+f5 load_config_file
# map kitty_mod+a>m set_background_opacity +0.1
# map kitty_mod+a>l set_background_opacity -0.1
# map kitty_mod+a>1 set_background_opacity 1
# map kitty_mod+a>d set_background_opacity default

### EXTERNAL THEMES
include themes/catppuccin-mocha.conf
#include themes/theme-macedo.conf